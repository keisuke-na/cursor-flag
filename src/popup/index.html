<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { width: 760px; padding: 16px; font-family: sans-serif; font-size: 14px; }
      h1 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
      h1 img { width: 20px; height: 20px; }
      .rule { display: flex; gap: 8px; align-items: center; margin-bottom: 2px; padding: 2px 6px; border-radius: 4px; }
      .rule--active { background: #fff8e1; }
      .rule input { flex: 1; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
      .rule input[type="checkbox"] { flex: 0 0 auto; padding: 0; }
      .rule input[type="color"] { flex: 0 0 auto; width: 26px; height: 26px; padding: 0; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: transparent; }
      .rule input[type="color"]:disabled { opacity: 0.35; cursor: not-allowed; }
      .rule input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
      .rule input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }
      .rule button { padding: 4px 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #fff; }
      .rule button:hover { background: #f0f0f0; }
      #add, #export, #import { margin-top: 8px; padding: 6px 12px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #fff; }
      #add:hover, #export:hover, #import:hover { background: #f0f0f0; }
      .rule label { cursor: pointer; user-select: none; white-space: nowrap; }
    </style>
  </head>
  <body>
    <h1><img src="/logo.png" alt="logo">CursorFlag</h1>
    <div id="rules"></div>
    <button id="add">+ Add Rule</button>
    <div style="margin-top: 12px; display: flex; gap: 8px;">
      <button id="export">Export</button>
      <button id="import">Import</button>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
